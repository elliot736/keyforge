name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - staging

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  check-ci:
    name: Verify CI passed
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - run: echo "CI passed, proceeding with deploy"

  build-and-push:
    name: Build & Push Images
    needs: check-ci
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'prod' }}
    outputs:
      api_image: ${{ steps.build-api.outputs.image }}
      dashboard_image: ${{ steps.build-dashboard.outputs.image }}
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push API image
        id: build-api
        uses: docker/build-push-action@v7
        env:
          ECR_REPO: ${{ steps.ecr-login.outputs.registry }}/keyforge-${{ inputs.environment || 'prod' }}-api
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.ECR_REPO }}:${{ github.sha }}
            ${{ env.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard image
        id: build-dashboard
        uses: docker/build-push-action@v7
        env:
          ECR_REPO: ${{ steps.ecr-login.outputs.registry }}/keyforge-${{ inputs.environment || 'prod' }}-dashboard
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.ECR_REPO }}:${{ github.sha }}
            ${{ env.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'prod' }}
    env:
      CLUSTER: keyforge-${{ inputs.environment || 'prod' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy API
        run: |
          aws ecs update-service \
            --cluster ${{ env.CLUSTER }} \
            --service ${{ env.CLUSTER }}-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Dashboard
        run: |
          aws ecs update-service \
            --cluster ${{ env.CLUSTER }} \
            --service ${{ env.CLUSTER }}-dashboard \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for API to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.CLUSTER }} \
            --services ${{ env.CLUSTER }}-api \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Dashboard to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.CLUSTER }} \
            --services ${{ env.CLUSTER }}-dashboard \
            --region ${{ env.AWS_REGION }}

      - name: Verify health
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names ${{ env.CLUSTER }} \
            --query 'LoadBalancers[0].DNSName' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "ALB: $ALB_DNS"

          for i in 1 2 3 4 5; do
            if curl -sf "http://$ALB_DNS:4000/health" | jq .; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
